<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <style>
      :root {
        --accent: #5b7c6a;
        --accent-strong: #2f4a3a;
        --accent-soft: #e6efe8;
        --surface: #ffffff;
      }

      /* Automatically toggles when the user's system is in dark mode */
      @media (prefers-color-scheme: dark) {
        :root {
          --surface: #16181d;
          --accent: #8fb39c;
          --accent-strong: #b6cfc0;
          --accent-soft: rgba(143, 179, 156, 0.12);
        }
      }

      .bg-lens { fill: var(--surface); }
      .accent-grad { stop-color: var(--accent); }
      .accent-strong-grad { stop-color: var(--accent-strong); }
    </style>

    <radialGradient id="ambient-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" class="accent-grad" stop-opacity="0.6"/>
      <stop offset="100%" class="accent-grad" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="bezel-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" class="accent-strong-grad"/>
      <stop offset="50%" class="accent-grad"/>
      <stop offset="100%" class="accent-strong-grad"/>
    </linearGradient>

    <linearGradient id="scan-beam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" class="accent-strong-grad"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <circle cx="16" cy="16" r="15" fill="url(#ambient-glow)" opacity="0.8"/>

  <circle cx="16" cy="16" r="13.5" stroke="url(#bezel-gradient)" stroke-width="1.5"/>

  <circle cx="16" cy="16" r="12" class="bg-lens" />

  <g opacity="0.25" stroke="url(#bezel-gradient)" stroke-width="1" stroke-linecap="round">
    <line x1="16" y1="4" x2="16" y2="28" />
    <line x1="5.6" y1="10" x2="26.4" y2="22" />
    <line x1="5.6" y1="22" x2="26.4" y2="10" />
  </g>

  <circle cx="16" cy="16" r="9" class="accent-grad" fill="var(--accent)" opacity="0.1"/>

  <g transform="translate(10, 8)">
    <rect x="0" y="0" width="12" height="16" rx="1" class="bg-lens" stroke="url(#bezel-gradient)" stroke-width="1"/>
    <rect x="0" y="0" width="12" height="16" rx="1" class="accent-grad" fill="var(--accent)" opacity="0.12"/>

    <line x1="2.5" y1="3" x2="6.5" y2="3" stroke="url(#bezel-gradient)" stroke-width="1" stroke-linecap="round"/>

    <line x1="2.5" y1="6" x2="9.5" y2="6" class="accent-grad" stroke="var(--accent)" stroke-width="0.75" stroke-linecap="round" opacity="0.8"/>
    <line x1="2.5" y1="8.5" x2="8.5" y2="8.5" class="accent-grad" stroke="var(--accent)" stroke-width="0.75" stroke-linecap="round" opacity="0.8"/>
    <line x1="2.5" y1="11" x2="9.5" y2="11" class="accent-grad" stroke="var(--accent)" stroke-width="0.75" stroke-linecap="round" opacity="0.8"/>

    <line x1="-1" y1="7" x2="13" y2="7" stroke="url(#scan-beam)" stroke-width="1"/>
  </g>
</svg>
